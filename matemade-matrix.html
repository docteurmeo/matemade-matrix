<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MateMade — Brand Territory Matrix</title>

<style>
  :root{
    --bg:#11100f; --panel:#1a1917; --panel2:#222019; --ink:#f4efe6; --muted:#a8a093;
    --line:#34302a; --accent:#e8a0b8; --gold:#d9b06a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',-apple-system,system-ui,sans-serif;
       -webkit-font-smoothing:antialiased;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  .topbar{padding:12px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;
          gap:20px;flex:0 0 auto;background:var(--panel);z-index:30}
  .topbar h1{font-size:18px;font-weight:700;white-space:nowrap}
  .topbar .sub{color:var(--muted);font-size:12.5px;line-height:1.4;max-width:560px}
  .topbar .sub b{color:var(--accent)}
  .tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .tab{padding:8px 14px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);
       border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
  .tab:hover{color:var(--ink);border-color:#4a443c}
  .tab.active{background:var(--accent);color:#1a1110;border-color:var(--accent)}
  .stage{position:relative;flex:1 1 auto;overflow:hidden}

  /* ----- pan/zoom world ----- */
  #viewport{position:absolute;inset:0;overflow:hidden;cursor:grab;
            background:radial-gradient(circle at 50% 50%,#1e1c18,#121110 60%,#0d0c0b 100%)}
  #viewport.drag{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0}
  #world svg{position:absolute;top:0;left:0;pointer-events:none}
  .node{position:absolute;cursor:pointer;transform:translate(-50%,-50%)}
  .node:hover{z-index:5}
  .node:hover .collage{box-shadow:0 8px 22px rgba(0,0,0,.6)}
  .node.sel .collage{outline:2px solid #fff;outline-offset:2px}
  .collage{width:210px;border-radius:12px;overflow:hidden;background:var(--panel);
           border:1px solid var(--line);box-shadow:0 4px 14px rgba(0,0,0,.35)}
  .collage.me{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),0 6px 20px rgba(232,160,184,.3)}
  .masonry{column-count:2;column-gap:3px;padding:3px;background:var(--line)}
  .masonry img{width:100%;height:auto;display:block;margin-bottom:3px;border-radius:4px;
               background:var(--panel2);break-inside:avoid;image-rendering:auto}
  .masonry .ph{display:flex;align-items:center;justify-content:center;height:150px;font-size:22px;
               color:#6f685d;font-weight:800;border-radius:4px;letter-spacing:1px}
  .clabel{padding:7px 9px;display:flex;align-items:center;gap:6px}
  .clabel .nm{font-size:13px;font-weight:700;line-height:1.1}
  .clabel .ob{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(255,255,255,.28)}
  .terrlabel{font-size:11px;color:var(--muted);text-align:center;margin-top:3px;font-weight:600}
  /* dot mode (images hidden) */
  .dnode{display:flex;flex-direction:column;align-items:center;gap:3px}
  .dnode .d{width:16px;height:16px;border-radius:50%;border:2px solid rgba(0,0,0,.3);box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .dnode .l{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;text-shadow:0 1px 4px #000,0 0 2px #000}
  .dnode .t{font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;text-shadow:0 1px 3px #000}
  .node.sel .d{outline:2px solid #fff;outline-offset:2px}
  .dnode.me .d{width:34px;height:34px;border:none;border-radius:0;background:var(--accent)!important;
    box-shadow:0 0 0 3px rgba(232,160,184,.35),0 0 18px rgba(232,160,184,.75);
    clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 56%,79% 91%,50% 70%,21% 91%,32% 56%,2% 35%,39% 35%)}
  .dnode.me .l{color:var(--accent);font-size:13px}

  /* ----- HUD / controls ----- */
  .hud{position:absolute;left:16px;bottom:16px;display:flex;flex-direction:column;gap:6px;z-index:20}
  .hud button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
              color:var(--ink);font-size:18px;cursor:pointer;font-weight:600}
  .hud button:hover{border-color:#4a443c;background:var(--panel2)}
  .legend{position:absolute;left:16px;top:16px;background:rgba(20,19,17,.85);border:1px solid var(--line);
          border-radius:12px;padding:12px 14px;z-index:20;backdrop-filter:blur(4px)}
  .legend .lt{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:700;margin-bottom:8px}
  .legend .row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-top:4px}
  .legend .dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.22)}

  /* ----- side detail panel ----- */
  .detail{position:absolute;right:0;top:0;bottom:0;width:330px;background:var(--panel);
          border-left:1px solid var(--line);padding:20px;overflow-y:auto;z-index:25;
          transform:translateX(100%);transition:transform .25s;box-shadow:-10px 0 30px rgba(0,0,0,.3)}
  .detail.open{transform:translateX(0)}
  .detail .x{position:absolute;right:14px;top:14px;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
  .detail .x:hover{color:var(--ink)}
  .sidetitle{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:700;margin-bottom:10px}
  .bname{font-size:20px;font-weight:700}
  .bterr{color:var(--accent);font-size:13px;font-weight:600;margin-top:2px}
  .bsum{color:var(--muted);font-size:13.5px;line-height:1.55;margin-top:12px}
  .glabel{color:var(--gold);font-weight:600;font-size:12px;margin:16px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;background:var(--panel2);
        border:1px solid var(--line);color:var(--muted);margin:3px 4px 0 0}
  .dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px}
  .dgrid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;display:block}
  .kvgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
  .kv{display:flex;flex-direction:column;font-size:12.5px}
  .kv .k{color:#7d756a;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .kv .v{color:var(--ink)}
  ul.learn{margin:4px 0 0 16px;padding:0}
  ul.learn li{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:3px}
  .terrlink{margin-top:14px;padding:10px 12px;border:1px dashed var(--accent);border-radius:10px;
            color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;text-align:center}
  .terrlink:hover{background:rgba(232,160,184,.08)}
  .sources{display:flex;flex-direction:column;gap:6px;margin-top:6px}
  .src{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;
       color:var(--muted);font-size:12.5px;text-decoration:none;background:var(--panel2)}
  .src:hover{border-color:var(--accent);color:var(--ink)}
  .src .type{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);flex:0 0 auto}
  .src .txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .comprow{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer;font-size:12.5px}
  .comprow:hover .cn{color:#fff}
  .comprow .cn{flex:0 0 96px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .comprow .cbar{flex:1;height:6px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .comprow .cbar i{display:block;height:100%}
  .comprow .cd{flex:0 0 30px;text-align:right;color:var(--muted);font-size:11px}
  .metric{margin-top:8px}
  .metric .ml{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px}
  .bar{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--gold))}

  /* ----- secondary views ----- */
  .pad{padding:24px;height:100%;overflow-y:auto}
  .layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;max-width:1200px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
  .mapwrap{background:radial-gradient(circle at 50% 46%,#1e1c18,#141311 70%);border:1px solid var(--line);border-radius:16px}
  svg{display:block;width:100%;height:auto}
  .nodelabel{font-size:10.5px;fill:var(--ink);font-weight:600}
  .ringlabel{font-size:10px;fill:#6f685d;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .axislabel{font-size:11px;fill:#7d756a;font-weight:600}
  .hint{color:var(--muted);font-size:13px;line-height:1.5}
  .chk{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer;font-size:13px}
  .chk:hover{border-color:#4a443c}.chk.on{border-color:var(--accent);background:rgba(232,160,184,.08)}
  .chk .sw{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
  .opp{background:linear-gradient(135deg,rgba(232,160,184,.12),rgba(217,176,106,.08));border:1px solid rgba(232,160,184,.3);border-radius:14px;padding:16px;margin-top:14px}
  .opp h3{font-size:15px;color:var(--accent)}.opp p{color:var(--muted);font-size:13.5px;line-height:1.55;margin-top:8px}
  .arrow{font-size:13px;color:var(--gold);margin:3px 0;font-weight:600}
  .scroll{max-height:60vh;overflow-y:auto;padding-right:4px}
  .legend2{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;font-size:12px;color:var(--muted);justify-content:center}
  .legend2 span{display:inline-flex;align-items:center;gap:6px}
</style>
</head>

function zip(keys,arr){const o={};keys.forEach((k,i)=>o[k]=arr[i]);return o;}

function domKey(obj){let k=null,mx=-1;for(const kk in obj){if(obj[kk]>mx){mx=obj[kk];k=kk;}}return k;}
function confOf(b){return (b.sem&&b.sem.conf)||(b.info&&b.info.conf)||b.confidence||"medium";}
function topCodes(obj,vnMap,colMap,n){return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n)

/* ===== C. PHÂN TÍCH CHIẾN LƯỢC (helpers) ===== */
function tierOf(r){return r<0.35?0:r<0.65?1:r<0.95?2:r<1.20?3:4;}
function sectorKeyOf(x,y){const r=Math.hypot(x,y);if(r<0.30)return"CORE";let a=Math.atan2(y,x)*180/Math.PI;if(a<0)a+=360;
  let best="E",bd=999;SECTORS.forEach(s=>{let d=Math.abs(a-s.ang);d=Math.min(d,360-d);if(d<bd){bd=d;best=s.key;}});return best;}
function describePoint(x,y){const k=sectorKeyOf(x,y),t=tierOf(Math.hypot(x,y));
  const sn=k==="CORE"?"Core":SECTOR_BY_KEY[k].en;return sn+" · Tier "+t;}
function visibleBrands(){return state.countryFilter.size===0?BRANDS:BRANDS.filter(b=>state.countryFilter.has(b.country));}
function densityAt(x,y){let s=0;const sig=0.33;visibleBrands().forEach(b=>{const d2=(x-b.x)**2+(y-b.y)**2;s+=Math.exp(-d2/(2*sig*sig));});return s;}
function nearestToMate(){const mm=BRANDS.find(b=>b.id==="matemade");
  return BRANDS.filter(b=>b.id!=="matemade").map(b=>({b,d:Math.hypot(b.x-mm.x,b.y-mm.y)})).sort((p,q)=>p.d-q.d);}
function findGaps(){
  const cells=[];
  for(let gx=-1.2;gx<=1.2;gx+=0.3)for(let gy=-1.2;gy<=1.2;gy+=0.3){
    const r=Math.hypot(gx,gy);if(r<0.4||r>1.15)continue;
    cells.push({x:gx,y:gy,d:densityAt(gx,gy)});
  }
  cells.sort((a,b)=>a.d-b.d);
  const picked=[];
  for(const c of cells){if(picked.every(p=>Math.hypot(p.x-c.x,p.y-c.y)>0.55)){picked.push(c);if(picked.length>=4)break;}}
  return picked;
}
function heatmapSVG(){
  const svg=el("svg",{width:WORLD,height:WORLD,viewBox:`0 0 ${WORLD} ${WORLD}`,style:"pointer-events:none"});
  const defs=el("defs");
  const rg=el("radialGradient",{id:"heatBlob",cx:"50%",cy:"50%",r:"50%"});
  rg.appendChild(el("stop",{offset:"0%","stop-color":"#ff4f73","stop-opacity":"0.42"}));
  rg.appendChild(el("stop",{offset:"42%","stop-color":"#e8556a","stop-opacity":"0.22"}));
  rg.appendChild(el("stop",{offset:"100%","stop-color":"#e8556a","stop-opacity":"0"}));
  defs.appendChild(rg);svg.appendChild(defs);
  visibleBrands().forEach(b=>{
    const px=wx(b.x),py=wy(b.y);
    svg.appendChild(el("circle",{cx:px,cy:py,r:0.42*U,fill:"url(#heatBlob)"}));
  });
  findGaps().forEach(g=>{const px=wx(g.x),py=wy(g.y);
    svg.appendChild(el("circle",{cx:px,cy:py,r:0.22*U,fill:"none",stroke:"#7ee0c0","stroke-width":3,"stroke-dasharray":"9 9"}));
    svg.appendChild(el("text",{x:px,y:py,"text-anchor":"middle","dominant-baseline":"middle",style:"font-size:14px;fill:#7ee0c0;font-weight:700"},"trống"));});
  return svg;
}

function el(tag,a,k){const e=document.createElementNS(SVGNS,tag);if(a)for(const p in a)e.setAttribute(p,a[p]);
  if(k)(Array.isArray(k)?k:[k]).forEach(c=>e.appendChild(typeof c==="string"?document.createTextNode(c):c));return e;}
function h(tag,a,k){const e=document.createElement(tag);
  if(a)for(const p in a){if(p==="class")e.className=a[p];else if(p==="html")e.innerHTML=a[p];
    else if(p.slice(0,2)==="on")e.addEventListener(p.slice(2),a[p]);else if(a[p]!=null)e.setAttribute(p,a[p]);}
  if(k)(Array.isArray(k)?k:[k]).forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;}

function collage(b){
  const isMe=b.id==="matemade";
  const col=brandColor(b);
  const subLabel=b.mVn||(terrInfo(b)?terrInfo(b).vn:"");
  let content;
  if(state.showImages){
    const imgs=(IMAGES[b.slug]||[]).slice(0,8);
    let inner;
    if(imgs.length){
      inner=h("div",{class:"masonry"}, imgs.map(s=>h("img",{src:s,loading:"lazy",alt:b.name})));
    }else{
      inner=h("div",{class:"masonry"}, h("div",{class:"ph",style:"background:"+col+"22;color:"+col}, b.name.slice(0,2).toUpperCase()));
    }
    const wrap=h("div",{class:"collage"+(isMe?" me":""),style:"border-color:"+col+"66"},[
      inner,
      h("div",{class:"clabel"},[h("span",{class:"ob",style:"background:"+col}),h("span",{class:"nm"},b.name)])
    ]);
    content=[wrap, h("div",{class:"terrlabel"},subLabel)];
  }else{
    content=[h("div",{class:"dnode"+(isMe?" me":"")},[
      h("div",{class:"d",style:"background:"+col}),
      h("div",{class:"l"},b.name),
      h("div",{class:"t"},subLabel)
    ])];
  }
  const node=h("div",{class:"node"+(state.sel===b.id?" sel":""),
    style:`left:${wx(b.x)}px;top:${wy(b.y)}px`,
    onclick:(e)=>{e.stopPropagation();state.sel=b.id;openDetail();markSel();}},
    content);
  node.dataset.id=b.id;
  return node;
}

function addSectors(svg,mate){
  const R=1.45*U;
  SECTORS.forEach(s=>{
    const pts=[[WC,WC]];
    for(let d=s.ang-22.5; d<=s.ang+22.5; d+=4.5) pts.push(ptAng(d,R));
    pts.push(ptAng(s.ang+22.5,R));
    svg.appendChild(el("polygon",{points:pts.map(p=>p.join(",")).join(" "),
      fill:s.color,"fill-opacity":0.10,stroke:s.color,"stroke-opacity":0.22,"stroke-width":1.25}));
    const [lx,ly]=ptAng(s.ang,R*0.82);
    const label=mate?(VECTORS[s.key]||""):s.en;
    const t=el("text",{x:lx,y:ly,"text-anchor":"middle","dominant-baseline":"middle",
      style:`font-size:15px;font-weight:800;fill:${s.color};opacity:1;text-shadow:0 1px 5px rgba(0,0,0,.75)`+(mate?"":";pointer-events:auto;cursor:pointer")},label);
    if(!mate)t.addEventListener("click",e=>{e.stopPropagation();openTerritory(s.key);});
    svg.appendChild(t);
  });
}
function worldSVG(opts){

  addSectors(svg,mate);
  if(opportunity){
    svg.appendChild(el("path",{d:`M ${WC} ${WC} L ${wx(-1.3)} ${wy(-0.4)} A ${1.36*U} ${1.36*U} 0 0 1 ${wx(-0.3)} ${wy(-1.2)} Z`,
      fill:"rgba(232,160,184,0.07)",stroke:"none"}));
  }
  RINGS.slice().reverse().forEach((rg,i)=>{const idx=RINGS.length-1-i;
    svg.appendChild(el("circle",{cx:WC,cy:WC,r:rg.r*U,fill:"none",stroke:OCOL[idx],"stroke-opacity":0.22,
      "stroke-width":2,"stroke-dasharray":idx===0?"none":"5 7"}));});

    style:"font-size:14px;fill:#6f685d"},labels[i])));

  svg.appendChild(el("line",{x1:WC,y1:WC-1.5*U,x2:WC,y2:WC+1.5*U,stroke:"#3a352e","stroke-width":1.5}));
  const ax={"font-size":"15px",fill:"#7d756a","font-weight":"600"};

  svg.appendChild(el("text",Object.assign({x:WC+1.5*U-10,y:WC-12,"text-anchor":"end"},ax),"Cool / Minimal / Polished →"));
  svg.appendChild(el("text",Object.assign({x:WC+12,y:WC-1.5*U+22},ax),"↑ Statement / Design / Craft"));
  svg.appendChild(el("text",Object.assign({x:WC+12,y:WC+1.5*U-12},ax),"↓ Daily / Utility / Value"));

/* ---------- PAN / ZOOM ---------- */
function applyView(){worldEl.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.k})`;}
function fitView(){
  const r=vpEl.getBoundingClientRect();
  const span=2.0*1.45*U; // diameter of outer ring-ish
  const k=Math.min(r.width,r.height)/span*0.92;
  view.k=k;
  view.tx=r.width/2 - WC*k;
  view.ty=r.height/2 - WC*k;
  applyView();
}
function zoomAt(cx,cy,factor){
  const nk=Math.max(0.15,Math.min(4,view.k*factor));
  const r=vpEl.getBoundingClientRect();
  const px=cx-r.left, py=cy-r.top;
  // world point under cursor stays fixed
  const wxp=(px-view.tx)/view.k, wyp=(py-view.ty)/view.k;
  view.k=nk;
  view.tx=px-wxp*nk; view.ty=py-wyp*nk;
  applyView();
}
function buildWorld(mode){
  // mode: 'orbit' | 'opp' | 'proximity'
  const mate=mode==="proximity";
  if(mate){const mm=BRANDS.find(b=>b.id==="matemade");ox=mm.x;oy=mm.y;}else{ox=0;oy=0;}
  vpEl=h("div",{id:"viewport"});
  worldEl=h("div",{id:"world",style:`width:${WORLD}px;height:${WORLD}px`});
  worldEl.appendChild(worldSVG({center:mate?"mate":"mass",opportunity:mode==="opp"}));
  const initVis=state.countryFilter.size===0?BRANDS:BRANDS.filter(b=>state.countryFilter.has(b.country));
  initVis.forEach(b=>worldEl.appendChild(collage(b)));
  heatEl=null;
  if(state.heatmap){heatEl=heatmapSVG();worldEl.insertBefore(heatEl,worldEl.children[1]);}
  vpEl.appendChild(worldEl);

  // wheel zoom
  vpEl.addEventListener("wheel",e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.12:0.893);},{passive:false});
  // drag pan
  let drag=false,sx,sy,stx,sty,moved;
  vpEl.addEventListener("pointerdown",e=>{drag=true;moved=false;sx=e.clientX;sy=e.clientY;stx=view.tx;sty=view.ty;});
  vpEl.addEventListener("pointermove",e=>{if(!drag)return;const dx=e.clientX-sx,dy=e.clientY-sy;
    if(!moved&&Math.abs(dx)+Math.abs(dy)>3){moved=true;vpEl.classList.add("drag");vpEl.setPointerCapture(e.pointerId);}
    if(moved){view.tx=stx+dx;view.ty=sty+dy;applyView();}});
  vpEl.addEventListener("pointerup",e=>{drag=false;vpEl.classList.remove("drag");
    if(vpEl.hasPointerCapture&&vpEl.hasPointerCapture(e.pointerId))vpEl.releasePointerCapture(e.pointerId);});
  vpEl.addEventListener("click",e=>{if(!moved&&e.target===vpEl){state.sel=null;closeDetail();}});

  // HUD
  const eyeBtn=h("button",{title:"Bật/tắt ảnh",onclick:toggleImages,style:"font-size:15px"},
    state.showImages?"👁":"🙈");
  const colBtn=h("button",{title:"Đổi màu: Territory / Tier",onclick:toggleColorMode,style:"font-size:12px;font-weight:700"},
    state.colorMode==="territory"?"T":"#");
  hudColor=colBtn;
  const heatBtn=h("button",{title:"Heatmap mật độ + vùng trống",onclick:toggleHeatmap,style:"font-size:14px;opacity:"+(state.heatmap?"1":"0.55")},"🔥");
  hudHeat=heatBtn;
  const anaBtn=h("button",{title:"Phân tích chiến lược",onclick:openAnalysis,style:"font-size:14px"},"📊");
  const hud=h("div",{class:"hud"},[
    h("button",{onclick:()=>{const r=vpEl.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,1.25);}},"+"),
    h("button",{onclick:()=>{const r=vpEl.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,0.8);}},"−"),
    h("button",{title:"Fit",onclick:fitView,style:"font-size:13px"},"⤢"),
    eyeBtn, colBtn, heatBtn, anaBtn,
  ]);
  hudEye=eyeBtn;
  curMate=mate;
  const legend=buildLegendEl(mate);

  const stage=document.getElementById("stage");
  stage.appendChild(vpEl);stage.appendChild(hud);stage.appendChild(legend);
  // stage.appendChild(buildLensBar()); // lens tạm tắt
  stage.appendChild(buildCountryBar());
  stage.appendChild(buildVersionBar());
  stage.appendChild(detailPanel());
  requestAnimationFrame(fitView);
}

const S=620,CX=S/2,CY=S/2,SC=192,toPx=(x,y)=>[CX+x*SC,CY-y*SC];

function radarSVG(){
  const N=7,R=160,cx=210,cy=215,pt=(i,v)=>{const a=-Math.PI/2+i*2*Math.PI/N;return[cx+Math.cos(a)*R*v/5,cy+Math.sin(a)*R*v/5];};
  const svg=el("svg",{viewBox:"0 0 420 450"});
  [1,2,3,4,5].forEach(l=>svg.appendChild(el("polygon",{points:Array.from({length:N},(_,i)=>pt(i,l).join(",")).join(" "),fill:"none",stroke:"#34302a"})));
  for(let i=0;i<N;i++){const[x,y]=pt(i,5);svg.appendChild(el("line",{x1:cx,y1:cy,x2:x,y2:y,stroke:"#34302a"}));}
  METRIC_LABELS.forEach((lb,i)=>{const[x,y]=pt(i,5.8);
    svg.appendChild(el("text",{x,y:y-7,"text-anchor":"middle","dominant-baseline":"middle",style:"font-size:11px;fill:var(--ink);font-weight:700"},lb));
    svg.appendChild(el("text",{x,y:y+8,"text-anchor":"middle","dominant-baseline":"middle",style:"font-size:10px;fill:var(--muted);font-weight:600"},METRIC_LABELS_VN[i]));
  });
  state.picks.forEach((id,k)=>{const b=BRANDS.find(x=>x.id===id);if(!b)return;
    svg.appendChild(el("polygon",{points:b.m.map((v,i)=>pt(i,v).join(",")).join(" "),fill:RADAR_COLORS[k],"fill-opacity":0.15,stroke:RADAR_COLORS[k],"stroke-width":2}));});
  return svg;
}
function viewProximity(){
  const stage=document.getElementById("stage");
  stage.appendChild(h("div",{class:"pad"},h("div",{class:"layout"},[
    h("div",{class:"mapwrap"},proximitySVG()),
    h("div",{class:"card"},[h("div",{class:"sidetitle"},"MateMade-centered"),
      h("p",{class:"hint"},"Tâm bản đồ là MateMade hiện tại (Generic Candy Sweet). Node xanh là các territory lân cận có thể dịch chuyển tới."),
      h("div",{class:"opp"},[h("h3",null,"Recommended path"),
        h("p",null,"Đường gold nét đứt là opportunity corridor: từ kẹo ngọt chung chung → hệ phụ kiện có chủ đích."),
        h("div",{class:"arrow"},"Charm Culture → Playful Utility"),
        h("div",{class:"arrow"},"→ Modular Self-expression"),
        h("div",{class:"arrow"},"→ Modular Candy Utility")])])])));
}
function viewHistory(){
  const stage=document.getElementById("stage");
  const versions=coordVersionsAll();
  const mkSelect=(cur,onSet)=>h("select",{onchange:(e)=>onSet(e.target.value)},
    versions.map(v=>h("option",{value:v.id},v.label+" ("+v.date+")")));
  const selA=mkSelect(state.histA,(v)=>{state.histA=v;viewHistory();});
  const selB=mkSelect(state.histB,(v)=>{state.histB=v;viewHistory();});
  selA.value=state.histA; selB.value=state.histB;
  const A=versions.find(v=>v.id===state.histA), B=versions.find(v=>v.id===state.histB);
  const rows=BRANDS.map(b=>{
    const pa=A.pos[b.id], pb=B.pos[b.id];
    if(!pa||!pb)return null;
    const dx=pb[0]-pa[0], dy=pb[1]-pa[1], dist=Math.sqrt(dx*dx+dy*dy);
    return {b,pa,pb,dx,dy,dist};
  }).filter(Boolean).sort((x,y)=>y.dist-x.dist);
  const table=h("table",{style:"width:100%;border-collapse:collapse;font-size:12.5px"},[
    h("tr",{style:"border-bottom:1px solid var(--line)"},[
      h("th",{style:"text-align:left;padding:6px 8px;color:var(--gold)"},"Brand"),
      h("th",{style:"text-align:right;padding:6px 8px;color:var(--muted)"},A.label),
      h("th",{style:"text-align:right;padding:6px 8px;color:var(--muted)"},B.label),
      h("th",{style:"text-align:right;padding:6px 8px;color:var(--gold)"},"Δ"),
    ]),
    ...rows.map(r=>h("tr",{style:"border-bottom:1px solid var(--line)"+(r.dist>0.05?";background:rgba(232,160,184,.06)":"")},[
      h("td",{style:"padding:6px 8px;cursor:pointer",onclick:()=>{state.tab="orbit";state.sel=r.b.id;renderTabs();renderTab();openDetail();}},r.b.name),
      h("td",{style:"text-align:right;padding:6px 8px;color:var(--muted)"},"("+r.pa[0].toFixed(2)+", "+r.pa[1].toFixed(2)+")"),
      h("td",{style:"text-align:right;padding:6px 8px"},"("+r.pb[0].toFixed(2)+", "+r.pb[1].toFixed(2)+")"),
      h("td",{style:"text-align:right;padding:6px 8px;font-weight:700;color:"+(r.dist>0.15?"var(--accent)":r.dist>0.05?"var(--gold)":"var(--muted)")},r.dist.toFixed(3)),
    ])),
  ]);
  const card=h("div",{class:"card"},[
    h("div",{class:"sidetitle"},"So sánh version tọa độ"),
    h("div",{style:"display:flex;gap:10px;align-items:center;margin:10px 0 16px;flex-wrap:wrap"},[
      h("span",{class:"hint"},"Từ:"),selA,h("span",{class:"hint"},"→ Đến:"),selB,
    ]),
    h("div",{class:"hint",style:"margin-bottom:12px"},
      "Click tên brand để mở chi tiết. Dòng tô hồng = thay đổi đáng kể (Δ>0.05). Sắp xếp theo độ thay đổi giảm dần."),
    h("div",{class:"scroll",style:"max-height:70vh"},table),
    h("div",{class:"hint",style:"margin-top:14px;font-style:italic"},
      "Để lưu version mới: khi có nghiên cứu tiếp theo, snapshot FINAL_POS hiện tại sẽ được đóng băng thành 1 entry mới trong COORD_HISTORY trước khi áp giá trị mới — \"Hiện tại\" luôn tự cập nhật."),
  ]);
  stage.appendChild(h("div",{class:"pad"},h("div",{class:"layout"},[card,h("div")])));
}
function viewRadar(){
  const stage=document.getElementById("stage");
  const metricHint=h("div",{class:"hint",style:"margin-top:10px;font-size:12px;line-height:1.6"},
    METRIC_LABELS.map((lb,i)=>lb+" = "+METRIC_LABELS_VN[i]).join(" · "));
  const left=h("div",{class:"card"},[radarSVG(),h("div",{class:"legend2"},
    state.picks.map((id,k)=>h("span",null,[h("span",{class:"dot",style:"width:11px;height:11px;border-radius:50%;background:"+RADAR_COLORS[k]}),BRANDS.find(b=>b.id===id).name]))),metricHint]);
  const list=h("div",{class:"scroll"},BRANDS.map(b=>{const on=state.picks.includes(b.id);
    return h("div",{class:"chk"+(on?" on":""),onclick:()=>{if(on)state.picks=state.picks.filter(x=>x!==b.id);
      else if(state.picks.length<4)state.picks.push(b.id);renderTab();}},
      [h("span",{class:"sw",style:"background:"+(on?RADAR_COLORS[state.picks.indexOf(b.id)]:"var(--line)")}),b.name]);}));
  stage.appendChild(h("div",{class:"pad"},h("div",{class:"layout"},
    [left,h("div",{class:"card"},[h("div",{class:"sidetitle"},"Chọn 2–4 brand so sánh"),list])])));
}

/* ---------- RENDER ---------- */
const TABS=[["orbit","🗺 Orbit Map"],["proximity","◎ MateMade Proximity"],["radar","△ Brand Comparison"],["opp","◆ Strategic Opportunity"],["history","🕐 Coord History"]];
function renderTab(){
  const stage=document.getElementById("stage");stage.innerHTML="";detailEl=null;
  if(state.tab==="orbit")buildWorld("orbit");
  else if(state.tab==="opp")buildWorld("opp");
  else if(state.tab==="proximity")buildWorld("proximity");
  else if(state.tab==="history")viewHistory();
  else viewRadar();
}
function renderTabs(){const t=document.getElementById("tabs");t.innerHTML="";
  TABS.forEach(([k,l])=>t.appendChild(h("div",{class:"tab"+(state.tab===k?" active":""),
    onclick:()=>{state.tab=k;renderTabs();renderTab();}},l)));}
renderTabs();renderTab();
window.addEventListener("resize",()=>{if(state.tab!=="radar"&&vpEl)fitView();});
</script>
</body>
</html>
